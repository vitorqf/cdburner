server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API and storage requests to the backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Required for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /storage/ {
        proxy_pass http://backend:8000;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
